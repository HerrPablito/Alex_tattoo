<!-- Loading State -->
<div *ngIf="loading()" class="fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm">
    <p-progressSpinner ariaLabel="loading"></p-progressSpinner>
</div>

<!-- Error State -->
<div *ngIf="error()"
    class="fixed top-24 left-1/2 -translate-x-1/2 z-50 bg-red-900/90 text-white px-6 py-4 rounded-lg shadow-xl border border-red-500/30 flex items-center gap-3">
    <i class="pi pi-exclamation-triangle text-xl"></i>
    <span>{{ error() }}</span>
</div>

<!-- Hero Section -->
<section class="relative h-[90vh] flex items-center justify-center overflow-hidden bg-brand-black">
    <div class="absolute inset-0 z-0 opacity-40">
        <!-- Placeholder for hero background (video or image) -->
        <img src="/images/back_tattoo.jpg" alt="Tattoo Background"
            class="w-full h-full object-cover grayscale brightness-50">
    </div>
    <div class="absolute inset-0 bg-gradient-to-t from-brand-black via-transparent to-black/60 z-10"></div>

    <div class="relative z-20 text-center px-4 max-w-4xl mx-auto flex flex-col items-center gap-6">
        <h1 class="text-6xl md:text-8xl font-serif font-bold text-white tracking-widest leading-none"
            style="text-shadow: 0 10px 30px rgba(0,0,0,0.5);">
            ALEX TATTOO
        </h1>
        <h4 class="text-xl md:text-2xl font-serif font-bold text-white tracking-widest leading-none"
            style="text-shadow: 0 10px 30px rgba(0,0,0,0.5);">
            GÖTEBORG
        </h4>
        <p class="google-sheet-text text-xl md:text-2xl text-brand-white/80 font-light tracking-wide max-w-2xl"
            [innerHTML]="t('hero_tagline') | formatText">
        </p>
        <div class="flex gap-4 mt-8">
            <a routerLink="/kontakt" pButton [label]="t('home_cta_contact')"
                class="p-button-outlined p-button-warning !border-brand-gold !text-brand-gold hover:!bg-brand-gold hover:!text-black !rounded-full !px-8 !py-3 !font-bold transition-all text-lg"></a>
            <a routerLink="/galleri" pButton [label]="t('home_cta_gallery')"
                class="p-button-text !text-white hover:!text-brand-gold !px-8 !py-3 transition-colors text-lg"></a>
        </div>
    </div>
</section>

<!-- About Section -->
<section class="py-24 bg-brand-black">
    <div class="container mx-auto px-4">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-16 items-center">
            <div class="relative">
                <div class="absolute -inset-4 rounded-sm z-0 translate-x-2 translate-y-2">
                </div>
                <!-- Optimized lazy loading for below-fold image -->
                <img src="/images/Alex-Stefani-tattooer.JPG"
                    alt="Alex Tattoo Artist" loading="lazy"
                    class="w-full h-full object-cover grayscale transition-all duration-700 relative z-10 shadow-2xl aspect-[3/4]">
            </div>
            <div class="flex flex-col gap-6">
                <span class="text-brand-gold text-sm tracking-[0.2em] font-bold uppercase">Artist</span>
                <h2 class="google-sheet-text text-4xl md:text-5xl font-serif font-bold text-white"
                    [innerHTML]="t('about_title') | formatText">
                </h2>
                <p class="google-sheet-text text-brand-white/70 text-lg leading-relaxed font-light"
                    [innerHTML]="t('about_text') | formatText">
                </p>
            </div>
        </div>
    </div>
</section>

<!-- Featured Works -->
<section class="py-24 bg-brand-dark border-t border-brand-gray/10">
    <div class="container mx-auto px-4">
        <div class="text-center mb-16">
            <span class="text-brand-gold text-sm tracking-[0.2em] font-bold uppercase block mb-4">Portfolio</span>
            <h2 class="text-4xl md:text-5xl font-serif font-bold text-white">{{ t('home_featured') }}</h2>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            @for (item of featuredItems(); track item.id; let i = $index) {
            <div class="relative group aspect-[3/4] overflow-hidden bg-brand-gray cursor-pointer"
                (click)="openLightbox(i)">
                <img [src]="item.imageUrl" [alt]="item.title"
                    class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105 opacity-90 group-hover:opacity-100">
                <div
                    class="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-center justify-center">
                    <i class="pi pi-search-plus text-white text-3xl drop-shadow-lg"></i>
                </div>
            </div>
            }
        </div>

        <!-- Lightbox -->
        <p-dialog [visible]="lightboxVisible()" (visibleChange)="lightboxVisible.set($event)"
            [modal]="true" [dismissableMask]="true" [showHeader]="false"
            [style]="{width: '95vw', maxWidth: '900px', background: 'transparent', boxShadow: 'none'}"
            [contentStyle]="{'padding': '0', 'background': 'transparent', 'overflow': 'visible'}"
            maskStyleClass="!bg-black/95">

            <div class="relative flex items-center justify-center" *ngIf="lightboxItem as item">

                <!-- Stäng -->
                <button (click)="lightboxVisible.set(false)"
                    class="absolute top-0 right-0 z-20 -translate-y-12 w-10 h-10 flex items-center justify-center text-white/70 hover:text-white transition-colors">
                    <i class="pi pi-times text-xl"></i>
                </button>

                <!-- Föregående -->
                <button (click)="prev()"
                    class="absolute left-0 z-20 -translate-x-14 w-12 h-12 flex items-center justify-center text-white/70 hover:text-white transition-colors">
                    <i class="pi pi-chevron-left text-2xl"></i>
                </button>

                <!-- Bild -->
                <img [src]="item.fullUrl" [alt]="item.title"
                    class="max-h-[85vh] max-w-full object-contain rounded shadow-2xl">

                <!-- Nästa -->
                <button (click)="next()"
                    class="absolute right-0 z-20 translate-x-14 w-12 h-12 flex items-center justify-center text-white/70 hover:text-white transition-colors">
                    <i class="pi pi-chevron-right text-2xl"></i>
                </button>

                <!-- Index-indikator -->
                <div class="absolute bottom-0 translate-y-10 text-white/40 text-xs tracking-widest">
                    {{ lightboxIndex() + 1 }} / {{ featuredItems().length }}
                </div>
            </div>
        </p-dialog>

        <div class="text-center mt-16">
            <a routerLink="/galleri" pButton [label]="t('home_view_all')"
                class="p-button-outlined p-button-warning !border-brand-gold !text-brand-gold hover:!bg-brand-gold hover:!text-black !rounded-full !px-8 !py-3 !font-bold transition-all text-sm tracking-widest"></a>
        </div>
    </div>
</section>
